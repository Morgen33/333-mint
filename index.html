<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The 333 Collection — Mint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Outfit', system-ui, sans-serif;
        min-height: 100vh;
        background: #0c0c0c;
        color: #e5e5e5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        /* Subtle dark red glow — muted */
        background-image: radial-gradient(ellipse 100% 80% at 50% 40%, rgba(80, 25, 25, 0.25) 0%, rgba(50, 15, 15, 0.1) 40%, transparent 70%);
      }
      .page { width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; gap: 0; }
      .hero { text-align: center; margin-bottom: 1.75rem; }
      .hero .top-line { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.35; margin: 0 0 0.5rem; color: #a3a3a3; }
      .hero .title { font-size: clamp(3rem, 12vw, 5rem); font-weight: 700; letter-spacing: -0.03em; margin: 0 0 0.15rem; color: #fafafa; }
      .hero .sub { font-size: 0.9rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.9; margin: 0 0 0.75rem; color: #d4d4d4; }
      .hero .tagline { font-size: 0.9rem; line-height: 1.5; opacity: 0.7; margin: 0; max-width: 360px; margin-left: auto; margin-right: auto; color: #a3a3a3; }
      .card { background: rgba(18, 18, 18, 0.95); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; padding: 2rem; width: 100%; text-align: center; }
      .card .section-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #9f5f5f; margin: 0 0 0.25rem; }
      .card h1, .card h2 { font-size: 1.25rem; font-weight: 600; margin: 0 0 1rem; color: #fafafa; }
      .card p { opacity: 0.85; margin: 0 0 1.25rem; font-size: 0.95rem; color: #d4d4d4; }
      .card img { width: 200px; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem; border: 1px solid rgba(255, 255, 255, 0.08); }
      button { background: #6b2d2d; color: #fafafa; border: none; padding: 14px 28px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; font-family: inherit; letter-spacing: 0.05em; transition: background 0.2s, opacity 0.2s; }
      button:hover:not(:disabled) { background: #5a2525; opacity: 0.95; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .wallet { margin-bottom: 1rem; }
      .error { color: #c97a7a; font-size: 0.9rem; margin-top: 0.5rem; }
      .success { color: #7da87d; font-size: 0.9rem; margin-top: 0.5rem; }
      #fallback .hero .title { color: #fafafa; }
    </style>
  </head>
  <body>
    <script>
      if (typeof global === 'undefined') { window.global = window; }
    </script>
    <div id="root">
      <div class="page" id="fallback">
        <header class="hero">
          <p class="top-line">Blood Moon Launch</p>
          <h1 class="title">333</h1>
          <p class="sub">The Collection</p>
          <p class="tagline">333 manifestation tokens on Solana. Each one awakens 3–6 AM and 3–6 PM EST — every day, forever.</p>
        </header>
        <div class="card">
          <p style="font-size: 0.9rem; opacity: 0.7;">Loading…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
